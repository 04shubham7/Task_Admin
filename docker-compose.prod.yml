version: '3.8'
services:
  backend:
    image: "${DOCKER_REGISTRY}/${DOCKERHUB_REPO:-fsd-intern-task}-backend:latest"
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    depends_on:
      - db

  frontend:
    image: "${DOCKER_REGISTRY}/${DOCKERHUB_REPO:-fsd-intern-task}-frontend:latest"
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-taskdb}
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
