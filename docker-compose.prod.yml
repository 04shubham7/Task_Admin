version: '3.8'
services:
  backend:
    image: "${DOCKER_REGISTRY}/${DOCKERHUB_REPO:-fsd-intern-task}-backend:latest"
    restart: unless-stopped
    ports:
      - "${BACKEND_HOST_PORT:-5001}:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASS:-${DB_PASSWORD:-password}}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-taskdb}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8080}
    depends_on:
      - db

  frontend:
    image: "${DOCKER_REGISTRY}/${DOCKERHUB_REPO:-fsd-intern-task}-frontend:latest"
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-8080}:80"
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_NAME:-taskdb}
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
